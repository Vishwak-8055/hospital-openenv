name: hospital_triage_env
description: AI environment for hospital triage and resource allocation

observation_space:
  type: dict
  properties:
    patients:
      type: list
    resources:
      type: dict

action_space:
  type: discrete
  actions:
    - treat_critical
    - treat_normal
    - wait

reward_range: [0.01, 0.99]

tasks:
  - id: easy
    name: "Easy Triage Task"
    description: "Handle easy scenarios"
    difficulty: "easy"
    grader: "tasks.easy.grader:grade"
  - id: medium
    name: "Medium Triage Task"
    description: "Handle medium scenarios"
    difficulty: "medium"
    grader: "tasks.medium.grader:grade"
  - id: hard
    name: "Hard Triage Task"
    description: "Handle hard scenarios"
    difficulty: "hard"
    grader: "tasks.hard.grader:grade"
