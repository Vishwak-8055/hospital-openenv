name: hospital_triage_env
version: "0.1.0"
author: "Your Name"
description: AI environment for hospital triage and resource allocation

reward_range: [0.01, 0.99]

tasks:
  - id: easy
    name: "Easy Triage Task"
    description: "Handle easy scenarios with a single critical patient"
    difficulty: "easy"
    grader: "tasks.easy.grader:grade"
  - id: medium
    name: "Medium Triage Task"
    description: "Handle medium scenarios with mixed-severity patients"
    difficulty: "medium"
    grader: "tasks.medium.grader:grade"
  - id: hard
    name: "Hard Triage Task"
    description: "Handle hard scenarios with many randomized patients"
    difficulty: "hard"
    grader: "tasks.hard.grader:grade"
